<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#04060e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Un Ramo Para Ti 🌻</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Italiana&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Canvas de fondo: pétalos cayendo y destellos -->
  <canvas id="canvas"></canvas>

  <main class="scene">

    <!-- Ramo de flores (generado por JS) -->
    <div class="bouquet-wrapper">
      <div class="bouquet" id="bouquet">
        <div class="bouquet-glow"></div>
      </div>
    </div>

    <!-- Tarjeta del mensaje -->
    <div class="message-wrap">
      <article class="message-card">

        <!-- Ornamento superior -->
        <span class="ornament-top" aria-hidden="true">❧</span>

        <h1 class="msg-title">Para Ti</h1>

        <div class="divider" aria-hidden="true">
          <span></span>
          <em class="diamond">◆</em>
          <span></span>
        </div>

        <p class="verse">
          Como estas flores que florecen al alba,<br>
          tu presencia ilumina cada rincón oscuro.
        </p>

        <p class="verse italic">
          Eres la luz que transforma lo ordinario<br>
          en algo eternamente hermoso.
        </p>

        <div class="divider" aria-hidden="true">
          <span></span>
          <em class="diamond">◆</em>
          <span></span>
        </div>

        <p class="verse small">
          Que cada pétalo de este ramo te recuerde<br>
          cuánto vales y cuánto te quieren.
        </p>

        <p class="signature">Con todo el amor del mundo &nbsp;🌼</p>

        <!-- Ornamento inferior -->
        <span class="ornament-bottom" aria-hidden="true">☙</span>

        <!-- Las esquinas decorativas se añaden desde JS -->
      </article>
    </div>

  </main>

  <script src="flowers.js"></script>
</body>
</html>
